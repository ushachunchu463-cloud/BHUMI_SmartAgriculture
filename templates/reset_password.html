<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#1b4332,#40916c);display:flex;align-items:center;justify-content:center;padding:2rem;}.card{border:none;border-radius:24px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:440px;width:100%;}.btn-g{background:linear-gradient(135deg,#2d6a4f,#40916c);color:white;border:none;border-radius:12px;padding:12px;width:100%;font-size:1rem;font-weight:700;cursor:pointer;}.form-control{border-radius:10px;border:1.5px solid #dee2e6;padding:11px 14px;}.form-control:focus{border-color:#40916c;box-shadow:0 0 0 3px rgba(64,145,108,.15);}.alert{border:none;border-radius:10px;}</style>
</head><body>
<div class="card">
  <h2 style="font-family:'Playfair Display',serif;color:#2d6a4f;margin-bottom:1rem;">🔑 Reset Password</h2>
  {% with messages=get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endif %}{% endwith %}
  <form method="POST">
    <div class="mb-3"><label style="font-weight:600;color:#444;font-size:.88rem;display:block;margin-bottom:5px;">New Password (min 6 characters)</label>
    <input type="password" name="password" class="form-control" placeholder="Enter new password" minlength="6" required></div>
    <button type="submit" class="btn-g">Reset Password →</button>
  </form>
</div>
</body></html>
