<!-- REGISTER -->
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register - Smart Agriculture</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#2d6a4f;--green-light:#40916c;--gold:#e9c46a;}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#1b4332,#2d6a4f,#40916c);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.wrapper{width:100%;max-width:560px;}
.card{border:none;border-radius:24px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.form-label{font-weight:600;color:#444;font-size:.88rem;margin-bottom:5px;}
.form-control,.form-select{border-radius:10px;border:1.5px solid #dee2e6;padding:11px 14px;font-size:.92rem;}
.form-control:focus,.form-select:focus{border-color:var(--green-light);box-shadow:0 0 0 3px rgba(64,145,108,.15);}
.btn-reg{background:linear-gradient(135deg,var(--green),var(--green-light));color:white;border:none;border-radius:12px;padding:13px;font-size:1rem;font-weight:700;width:100%;cursor:pointer;font-family:'DM Sans',sans-serif;}
.alert{border:none;border-radius:10px;}
</style></head><body>
<div class="wrapper">
  <div style="text-align:center;color:white;margin-bottom:1.5rem;">
    <h1 style="font-family:'Playfair Display',serif;font-size:1.9rem;">🌾 Smart<span style="color:#e9c46a;">Agriculture</span></h1>
    <p style="opacity:.85;">Create your farmer account</p>
  </div>
  <div class="card">
    <h2 style="font-family:'Playfair Display',serif;color:#2d6a4f;margin-bottom:1.5rem;">👨‍🌾 Register</h2>
    {% with messages=get_flashed_messages(with_categories=true) %}{% if messages %}{% for c,m in messages %}<div class="alert alert-{{c}}">{{m}}</div>{% endfor %}{% endif %}{% endwith %}
    <form method="POST">
      <div class="row g-3">
        <div class="col-12"><label class="form-label">Full Name</label><input type="text" name="name" class="form-control" placeholder="Enter your full name" required></div>
        <div class="col-md-6"><label class="form-label">Phone Number</label><input type="tel" name="phone" class="form-control" placeholder="10-digit mobile" pattern="[0-9]{10}" required></div>
        <div class="col-md-6"><label class="form-label">Email Address</label><input type="email" name="email" class="form-control" placeholder="your@email.com" required></div>
        <div class="col-12"><label class="form-label">Password (min 6 characters)</label><input type="password" name="password" class="form-control" placeholder="Create a strong password" minlength="6" required></div>
        <div class="col-md-6">
          <label class="form-label">State</label>
          <select name="state" id="stateSelect" class="form-select" required onchange="loadDistricts()">
            <option value="">Select State</option>
            {% for s in states %}<option value="{{s}}">{{s}}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">District</label>
          <select name="district" id="districtSelect" class="form-select" required><option value="">Select District</option></select>
        </div>
        <div class="col-12 mt-2"><button type="submit" class="btn-reg">Create Account & Continue →</button></div>
      </div>
    </form>
    <div style="text-align:center;margin-top:1rem;font-size:.9rem;color:#666;">Already have an account? <a href="{{ url_for('login') }}" style="color:#2d6a4f;font-weight:600;">Login here</a></div>
  </div>
</div>
<script>
const dd={{districts|tojson}};
function loadDistricts(){
  const s=document.getElementById('stateSelect').value;
  const d=document.getElementById('districtSelect');
  d.innerHTML='<option value="">Select District</option>';
  if(dd[s])dd[s].forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;d.appendChild(o);});
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
