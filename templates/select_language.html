<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Select Language</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:linear-gradient(135deg,#1b4332,#40916c);display:flex;align-items:center;justify-content:center;padding:2rem;}
.wrapper{width:100%;max-width:520px;}
.top{text-align:center;color:white;margin-bottom:1.5rem;}
.card{border:none;border-radius:24px;padding:2.5rem;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.lang-opt{border:2px solid #e9ecef;border-radius:14px;padding:1.1rem 1.3rem;display:flex;align-items:center;gap:1rem;margin-bottom:.8rem;cursor:pointer;transition:all .2s;}
.lang-opt.sel{border-color:#2d6a4f;background:#f0faf4;}
.lang-opt:hover{border-color:#40916c;background:#f5fbf7;transform:translateX(4px);}
.lang-flag{font-size:2.2rem;}
.lang-info h3{font-size:1rem;font-weight:700;color:#2d6a4f;margin:0;}
.lang-info p{font-size:.82rem;color:#888;margin:0;}
.lang-native{margin-left:auto;font-size:1.2rem;color:#ccc;font-weight:700;}
.btn-c{background:linear-gradient(135deg,#2d6a4f,#40916c);color:white;border:none;border-radius:12px;padding:13px;width:100%;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;font-family:'DM Sans',sans-serif;}
</style></head><body>
<div class="wrapper">
  <div class="top">
    <div style="font-size:3rem;">🌍</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:1.9rem;">Welcome, {{ current_user.name.split()[0] }}!</h1>
    <p style="opacity:.85;">Choose your preferred language</p>
  </div>
  <div class="card">
    <h2 style="font-family:'Playfair Display',serif;color:#2d6a4f;text-align:center;margin-bottom:.3rem;">Select Language</h2>
    <p style="text-align:center;color:#888;margin-bottom:1.5rem;font-size:.88rem;">भाषा चुनें / భాష ఎంచుకోండి</p>
    <form method="POST" id="lf">
      <input type="hidden" name="language" id="sl" value="en">
      <div class="lang-opt sel" onclick="pick('en',this)">
        <div class="lang-flag">🇬🇧</div>
        <div class="lang-info"><h3>English</h3><p>Continue in English</p></div>
        <div class="lang-native">EN</div>
      </div>
      <div class="lang-opt" onclick="pick('hi',this)">
        <div class="lang-flag">🇮🇳</div>
        <div class="lang-info"><h3>Hindi</h3><p>हिंदी में जारी रखें</p></div>
        <div class="lang-native">हि</div>
      </div>
      <div class="lang-opt" onclick="pick('te',this)">
        <div class="lang-flag">🇮🇳</div>
        <div class="lang-info"><h3>Telugu</h3><p>తెలుగులో కొనసాగించండి</p></div>
        <div class="lang-native">తె</div>
      </div>
      <button type="submit" class="btn-c">Continue →</button>
    </form>
  </div>
</div>
<script>
function pick(lang,el){
  document.querySelectorAll('.lang-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('sl').value=lang;
}
</script>
</body></html>
